# Ralphy Configuration
# https://github.com/michaelshimeles/ralphy

# Project info (auto-detected, edit if needed)
project:
  name: "Kuwait Multi-Vendor Marketplace"
  language: "TypeScript"
  framework: "Medusa v2 + Next.js 14"
  description: "Multi-vendor ecommerce marketplace for Kuwait with Medusa backend and Next.js storefront"

# Commands (auto-detected from package.json/pyproject.toml)
commands:
  test: "cd backend && npm test"
  lint: "cd backend && npm run lint"
  build: "cd backend && npm run build"

# Rules - instructions the AI MUST follow
# These are injected into every prompt
rules:
  - "ALWAYS write tests BEFORE implementation per TDD. Never mark a task complete without tests matching the testStrategy field."
  - "ALWAYS verify task completion using available tools: Playwright for UI, API calls for endpoints, shell commands for configs, test files for logic. If it can be verified, verify it before marking complete."
  - "For verification tasks (V-*): NEVER mark complete until ALL checks pass. If any check fails, fix the issue and re-run verification. Keep retrying until SUCCESS CRITERIA is met."
  - "When using Playwright MCP, always take screenshots as evidence. If a page fails to load or shows errors, troubleshoot (check if services are running, check logs) and retry."
  # Examples:
  # - "Always use TypeScript strict mode"
  # - "Follow the error handling pattern in src/utils/errors.ts"
  # - "All API endpoints must have input validation with Zod"
  # - "Use server actions instead of API routes in Next.js"
  #
  # Skills/playbooks (optional):
  # - "Before coding, read and follow any relevant skill/playbook docs under .opencode/skills or .claude/skills."

# Boundaries - files/folders the AI should not modify
boundaries:
  never_touch:
    # Examples:
    # - "src/legacy/**"
    # - "migrations/**"
    # - "*.lock"
