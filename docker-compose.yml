# Docker Compose for Kuwait Marketplace - Medusa Backend
# Production-ready configuration with PostgreSQL and Redis

services:
  # ==========================================================
  # Medusa Backend API
  # ==========================================================
  medusa:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: medusa-backend
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      # Database
      - DATABASE_URL=postgresql://medusa:medusa_password@db:5432/medusa
      # Redis
      - REDIS_URL=redis://redis:6379
      # Security (override in .env for production)
      - JWT_SECRET=${JWT_SECRET:-supersecret-jwt-change-in-production-min-32-chars}
      - COOKIE_SECRET=${COOKIE_SECRET:-supersecret-cookie-change-in-production-min-32-chars}
      # CORS
      - STORE_CORS=${STORE_CORS:-http://localhost:8000}
      - ADMIN_CORS=${ADMIN_CORS:-http://localhost:9000}
      - AUTH_CORS=${AUTH_CORS:-http://localhost:8000,http://localhost:9000}
      # Admin
      - MEDUSA_BACKEND_URL=${MEDUSA_BACKEND_URL:-http://localhost:9000}
      - DISABLE_ADMIN=${DISABLE_ADMIN:-false}
      # Worker mode
      - WORKER_MODE=${WORKER_MODE:-shared}
      # Node environment
      - NODE_ENV=${NODE_ENV:-production}
      # Twilio (optional)
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - medusa-network
    volumes:
      - medusa-uploads:/app/uploads

  # ==========================================================
  # PostgreSQL Database
  # ==========================================================
  db:
    image: postgres:15-alpine
    container_name: medusa-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=medusa
      - POSTGRES_PASSWORD=medusa_password
      - POSTGRES_DB=medusa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medusa-network

  # ==========================================================
  # Redis Cache and Event Bus
  # ==========================================================
  redis:
    image: redis:7-alpine
    container_name: medusa-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - medusa-network

# ==========================================================
# Networks
# ==========================================================
networks:
  medusa-network:
    driver: bridge

# ==========================================================
# Volumes
# ==========================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  medusa-uploads:
    driver: local
